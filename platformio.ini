; PlatformIO Project Configuration File – Smart Greenhouse
; https://docs.platformio.org/page/projectconf.html

[env:upesy_wroom]
platform  = espressif32
board     = upesy_wroom
framework = arduino

monitor_speed   = 115200
monitor_filters = esp32_exception_decoder

lib_deps =
    ; Temperature + humidity
    adafruit/DHT sensor library       @ ^1.4.6
    adafruit/Adafruit Unified Sensor  @ ^1.1.14
    ; Light (BH1750 lux sensor)
    claws/BH1750                      @ ^1.3.0
    ; Async web server + WebSocket (ESPHome maintained fork)
    esphome/AsyncTCP-esphome          @ ^2.1.4
    esphome/ESPAsyncWebServer-esphome @ ^3.3.0
    ; JSON serialisation
    bblanchon/ArduinoJson             @ ^7.3.0

; Upgrade to C++17 so std::make_unique, std::clamp, and digit separators work
build_unflags = -std=gnu++11

build_flags =
    -std=gnu++17
    ; Set log level: 0=None 1=Error 2=Warn 3=Info 4=Debug 5=Verbose
    -DCORE_DEBUG_LEVEL=3
    ; Pin AsyncTCP to core 1 so it does not conflict with sensor tasks on core 0
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=1
    -DCONFIG_ASYNC_TCP_STACK_SIZE=4096
